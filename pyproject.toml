[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
qt_api = "pyqt6"

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*", "ocr_scanner.tests.*"]
strict = false
disable_error_code = ["no-untyped-def", "type-arg", "operator", "comparison-overlap", "misc", "union-attr", "unused-ignore"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B"]
